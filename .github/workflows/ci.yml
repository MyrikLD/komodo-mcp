name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run python -c "from komodo_mcp.server import mcp; print(f'{len(mcp._tool_manager._tools)} tools registered')"
        env:
          KOMODO_MCP_KOMODO_URL: http://localhost
          KOMODO_MCP_KOMODO_API_KEY: test
          KOMODO_MCP_KOMODO_API_SECRET: test

  docker:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: komodo-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
